<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>英语单词背诵平台</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        .app { max-width: 500px; margin: 0 auto; min-height: 100vh; position: relative; }
        
        /* 页面切换 */
        .page { display: none; min-height: 100vh; padding: 20px; }
        .page.active { display: block; }
        
        /* 登录/注册页面 */
        #loginPage { align-items: center; justify-content: center; }
        #loginPage.active { display: flex; }
        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .login-title {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-title h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .login-title p { color: #999; font-size: 14px; }
        .tab-switch {
            display: flex;
            margin-bottom: 25px;
            background: #f0f3ff;
            border-radius: 12px;
            padding: 4px;
        }
        .tab-switch button {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: #666;
            transition: all 0.3s;
        }
        .tab-switch button.active {
            background: white;
            color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .error-msg {
            color: #ef4444;
            font-size: 13px;
            margin-top: -8px;
            margin-bottom: 12px;
            min-height: 18px;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-secondary {
            background: #f0f3ff;
            color: #667eea;
            margin-top: 12px;
        }
        .btn-secondary:hover { background: #e8edff; }
        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }
        .btn-success:hover { box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4); }
        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }
        .btn-danger:hover { box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4); }
        .btn-back {
            background: white;
            color: #666;
            border: 2px solid #e0e0e0;
            padding: 10px 16px;
            width: auto;
            font-size: 14px;
        }
        
        /* 主页面头部 */
        .main-header {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
        }
        .user-name { font-weight: 600; font-size: 15px; }
        .score-badge {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
        }
        .header-actions { display: flex; gap: 8px; }
        .header-btn {
            padding: 8px 14px;
            border: none;
            background: #f0f3ff;
            color: #667eea;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .header-btn:hover { background: #e8edff; }
        
        /* 导航标签 */
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .nav-tab {
            flex: 1;
            padding: 14px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav-tab.active {
            background: white;
            color: #667eea;
        }
        
        /* 年级/单元选择 */
        .section-title {
            color: white;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .grade-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 14px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .grade-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15); }
        .grade-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .grade-name { font-size: 18px; font-weight: 700; }
        .grade-icon { font-size: 36px; }
        .grade-desc { color: #666; font-size: 13px; margin-bottom: 10px; }
        .grade-progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }
        .grade-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.5s;
        }
        .grade-stats {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #999;
            margin-top: 6px;
        }
        
        /* 模块/单元页面 */
        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 16px;
        }
        .module-section {
            margin-bottom: 20px;
        }
        .module-title {
            color: white;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            padding-left: 12px;
            border-left: 4px solid rgba(255, 255, 255, 0.6);
        }
        .unit-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .unit-card {
            background: white;
            border-radius: 12px;
            padding: 16px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .unit-card:hover { transform: translateY(-2px); }
        .unit-card.studied { background: #f0fdf4; }
        .unit-num { font-size: 20px; font-weight: 700; color: #667eea; margin-bottom: 4px; }
        .unit-card.studied .unit-num { color: #10b981; }
        .unit-word-count { font-size: 12px; color: #999; }
        .unit-status { font-size: 11px; color: #10b981; margin-top: 2px; }
        
        /* 背诵设置页面 */
        .settings-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .settings-section { margin-bottom: 24px; }
        .settings-section:last-child { margin-bottom: 0; }
        .settings-label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #333;
        }
        .mode-options { display: flex; gap: 12px; }
        .mode-option {
            flex: 1;
            padding: 20px;
            border: 3px solid #e0e0e0;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .mode-option:hover { border-color: #667eea; background: #f8f9ff; }
        .mode-option.active { border-color: #667eea; background: #f0f3ff; }
        .mode-icon { font-size: 36px; margin-bottom: 8px; }
        .mode-text { font-size: 15px; font-weight: 600; }
        .count-input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            text-align: center;
        }
        .count-input:focus { outline: none; border-color: #667eea; }
        .count-hint { font-size: 13px; color: #999; text-align: center; margin-top: 8px; }
        
        /* 背诵界面 */
        .recite-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            color: white;
            font-size: 14px;
        }
        .recite-progress-bar {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            margin: 0 15px;
            overflow: hidden;
        }
        .recite-progress-fill {
            height: 100%;
            background: white;
            border-radius: 4px;
            transition: width 0.5s;
        }
        .recite-card {
            background: white;
            border-radius: 20px;
            padding: 50px 24px;
            text-align: center;
            margin-bottom: 24px;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        .recite-word {
            font-size: 34px;
            font-weight: 700;
            line-height: 1.3;
            word-break: break-word;
            overflow-wrap: break-word;
            color: #333;
        }
        .recite-answer {
            font-size: 24px;
            font-weight: 500;
            line-height: 1.4;
            word-break: break-word;
            overflow-wrap: break-word;
            color: #667eea;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .recite-answer.show { visibility: visible; opacity: 1; }
        .action-buttons { display: flex; gap: 12px; }
        .action-buttons .btn { flex: 1; margin: 0; }
        .btn-show {
            background: #f0f3ff;
            color: #667eea;
        }
        .btn-show:hover { background: #e8edff; }
        
        .star-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #fbbf24;
            padding: 0;
            line-height: 1;
            transition: transform 0.2s;
        }
        .star-btn:hover { transform: scale(1.2); }
        .star-btn.starred { color: #fbbf24; }
        
        /* 结果页面 */
        .result-card {
            background: white;
            border-radius: 20px;
            padding: 40px 24px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        .result-icon { font-size: 80px; margin-bottom: 16px; }
        .result-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .result-text { color: #666; margin-bottom: 24px; }
        .result-stats {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 15px;
        }
        .stat-row + .stat-row { border-top: 1px solid #e8edff; }
        .stat-label { color: #666; }
        .stat-value { font-weight: 600; color: #667eea; }
        
        /* 错题集 */
        .wrongbook-empty {
            background: white;
            border-radius: 16px;
            padding: 60px 24px;
            text-align: center;
        }
        .wrongbook-icon { font-size: 64px; margin-bottom: 16px; }
        .wrongbook-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .wrongbook-desc { color: #999; font-size: 14px; }
        
        .wrong-grade-section { margin-bottom: 20px; }
        .wrong-grade-title {
            color: white;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .wrong-module {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
        }
        .wrong-unit-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        .wrong-unit-item {
            background: #fef2f2;
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .wrong-unit-item:hover { background: #fee2e2; }
        .wrong-unit-count { color: #ef4444; font-weight: 600; }
        
        .wrong-word-item {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .wrong-word-info { flex: 1; }
        .wrong-word-en { font-size: 18px; font-weight: 700; color: #333; margin-bottom: 4px; }
        .wrong-word-zh { font-size: 14px; color: #666; }
        .remove-wrong-btn {
            background: #fef2f2;
            color: #ef4444;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .remove-wrong-btn:hover { background: #fee2e2; }
        
        /* 模态框 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white;
            border-radius: 20px;
            padding: 30px 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            text-align: center;
        }
        .modal-desc {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .modal-note {
            background: #fef3c7;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            color: #92400e;
            margin-bottom: 20px;
        }
        .modal-buttons { display: flex; gap: 12px; }
        .modal-buttons .btn { margin: 0; }
        input[type="file"] { display: none; }
        
        /* 加载提示 */
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 响应式 */
        @media (max-width: 480px) {
            .recite-word { font-size: 28px; }
            .recite-answer { font-size: 20px; }
            .login-title h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- 登录/注册页面 -->
        <div id="loginPage" class="page active">
            <div class="login-box">
                <div class="login-title">
                    <h1>📚 英语单词背诵</h1>
                    <p>高效记忆，快乐学习</p>
                </div>
                <div class="tab-switch">
                    <button id="tabLogin" class="active" onclick="switchLoginTab('login')">登录</button>
                    <button id="tabRegister" onclick="switchLoginTab('register')">注册</button>
                </div>
                <div id="loginForm">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="loginUsername" placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="loginPassword" placeholder="请输入密码">
                    </div>
                    <div id="loginError" class="error-msg"></div>
                    <button class="btn btn-primary" onclick="doLogin()">登录</button>
                </div>
                <div id="registerForm" style="display:none;">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="regUsername" placeholder="请设置用户名">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="regPassword" placeholder="请设置密码（至少6位）">
                    </div>
                    <div class="form-group">
                        <label>确认密码</label>
                        <input type="password" id="regPassword2" placeholder="请再次输入密码">
                    </div>
                    <div id="registerError" class="error-msg"></div>
                    <button class="btn btn-primary" onclick="doRegister()">注册</button>
                </div>
            </div>
        </div>
        
        <!-- 加载词库页面 -->
        <div id="loadingPage" class="page">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>正在加载词库...</p>
            </div>
        </div>
        
        <!-- 主页面（年级选择）-->
        <div id="mainPage" class="page">
            <div class="main-header">
                <div class="user-info">
                    <div id="userAvatar" class="user-avatar">U</div>
                    <div>
                        <div id="headerUsername" class="user-name">用户</div>
                        <div class="score-badge" id="headerScore">积0</div>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="header-btn" onclick="showIEModal()">导入/导出</button>
                    <button class="header-btn" onclick="doLogout()">退出</button>
                </div>
            </div>
            
            <div class="nav-tabs">
                <button class="nav-tab active" onclick="switchNav('study')">📖 背诵</button>
                <button class="nav-tab" onclick="switchNav('wrongbook')">📝 错题本</button>
            </div>
            
            <div id="studyContent">
                <div class="section-title">选择年级</div>
                <div id="gradeList"></div>
            </div>
            
            <div id="wrongbookContent" style="display:none;">
                <div class="section-title" style="display:flex;justify-content:space-between;align-items:center;">
                    <span>我的错题本</span>
                    <button id="reciteAllWrongBtn" class="header-btn" onclick="reciteAllWrong()" style="display:none;">📖 背诵全部</button>
                </div>
                <div id="wrongbookList"></div>
            </div>
        </div>
        
        <!-- 单元选择页面 -->
        <div id="unitPage" class="page">
            <button class="back-btn" onclick="goBackToGrade()">←返回年级</button>
            <div class="section-title" id="unitGradeTitle">选择单元</div>
            <div id="unitList"></div>
        </div>
        
        <!-- 错题详情页面 -->
        <div id="wrongDetailPage" class="page">
            <button class="back-btn" onclick="goBackToWrongBook()">←返回错题本</button>
            <div class="section-title" id="wrongDetailTitle">错题详情</div>
            <div id="wrongDetailList"></div>
        </div>
        
        <!-- 背诵设置页面 -->
        <div id="settingsPage" class="page">
            <button class="back-btn" onclick="goBackToUnit()">←返回单元</button>
            <div class="settings-card">
                <div class="settings-section">
                    <div class="settings-label">选择背诵模式</div>
                    <div class="mode-options">
                        <div class="mode-option active" data-mode="english" onclick="selectMode('english')">
                            <div class="mode-icon">🇬🇧</div>
                            <div class="mode-text">看英文</div>
                        </div>
                        <div class="mode-option" data-mode="chinese" onclick="selectMode('chinese')">
                            <div class="mode-icon">🇨🇳</div>
                            <div class="mode-text">看中文</div>
                        </div>
                    </div>
                </div>
                <div class="settings-section">
                    <div class="settings-label">本次背诵单词数</div>
                    <input type="number" class="count-input" id="countInput" min="1" value="10">
                    <div class="count-hint" id="countHint">本单元共 0 个单词</div>
                </div>
                <button class="btn btn-primary" onclick="startRecite()">开始背诵</button>
            </div>
        </div>
        
        <!-- 背诵页面 -->
        <div id="recitePage" class="page">
            <div class="recite-header">
                <span id="reciteCurrent">1</span>
                <div class="recite-progress-bar">
                    <div id="reciteProgressFill" class="recite-progress-fill" style="width: 0%"></div>
                </div>
                <span id="reciteTotal">10</span>
            </div>
            <div class="recite-card">
                <div style="display:flex;justify-content:flex-end;">
                    <button id="starBtn" class="star-btn" onclick="toggleStar()" title="加入错题本">⭐</button>
                </div>
                <div id="reciteWord" class="recite-word"></div>
                <div id="reciteAnswer" class="recite-answer"></div>
            </div>
            <div id="showAnswerBtn">
                <button class="btn btn-show" style="width:100%;" onclick="showAnswer()">显示答案</button>
            </div>
            <div id="markButtons" class="action-buttons" style="display:none;">
                <button class="btn btn-danger" onclick="markWrong()">不会</button>
                <button class="btn btn-success" onclick="markRight()">会了</button>
            </div>
            <button class="btn btn-secondary" style="margin-top:16px;" onclick="quitRecite()">退出背诵</button>
        </div>
        
        <!-- 复习错题页面 -->
        <div id="reviewPage" class="page">
            <div class="result-card">
                <div id="resultIcon" class="result-icon">📝</div>

                <div class="result-text" id="reviewText">你有 0 个错题</div>
                <div class="result-stats">
                    <div class="stat-row">
                        <span class="stat-label">正确</span>
                        <span id="statRight" class="stat-value">0</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">错误</span>
                        <span id="statWrong" class="stat-value">0</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">获得积分</span>
                        <span id="statScore" class="stat-value">0</span>
                    </div>
                </div>
                <button id="reviewWrongBtn" class="btn btn-primary" onclick="reviewWrong()">再背一遍错题</button>
                <button class="btn btn-secondary" onclick="goBackToUnit()">返回单元选择</button>
            </div>
        </div>
        
        <!-- 导入/导出模态框 -->
        <div id="ieModal" class="modal-overlay">
            <div class="modal">
                <div class="modal-title">📁 导入/导出学习数据</div>
                <div class="modal-desc">

                <div class="modal-buttons">
                    <button class="btn btn-primary" onclick="exportData()">导出数据</button>
                    <label class="btn btn-secondary" style="text-align:center;cursor:pointer;">
                        导入数据
                        <input type="file" id="importFile" accept=".recite" onchange="importData(event)">
                    </label>
                </div>
                <button class="btn btn-secondary" onclick="closeIEModal()" style="margin-top:12px;">关闭</button>
            </div>
        </div>
    </div>

    // ==================== 词库加载 ====================
    async function loadWordData() {
        showPage('loadingPage');
        try {
            const binaryString = atob(WORD_DB_BASE64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            const workbook = XLSX.read(bytes, { type: 'array' });
            const sheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[sheetName];
            const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
            
            wordData = {};
            for (let i = 0; i < jsonData.length; i++) {
                const row = jsonData[i];
                if (!row[0] || row[1] === undefined || row[2] === undefined) continue;
                
                const code = String(row[0]).trim();
                const chinese = String(row[1]).trim();
                const english = String(row[2]).trim();
                
                if (!code || !chinese || !english) continue;
                
                const match = code.match(/^(\d+[AB])M(\d+)U(\d+)$/i);
                if (match) {
                    const grade = match[1].toUpperCase();
                    const module = 'M' + match[2];
                    const unit = 'U' + match[3];
                    
                    if (!wordData[grade]) wordData[grade] = {};
                    if (!wordData[grade][module]) wordData[grade][module] = {};
                    if (!wordData[grade][module][unit]) wordData[grade][module][unit] = [];
                    
                    wordData[grade][module][unit].push({ en: english, zh: chinese });
                }
            }
            
            wordDataLoaded = true;
            if (currentUser) {
                showMainPage();
            } else {
                showPage('loginPage');
            }
        } catch (e) {
            console.error('加载词库失败:', e);
            document.querySelector('#loadingPage .loading').innerHTML = 
                '<div style="font-size:48px;margin-bottom:16px;">⚠️</div>' +
                '<p>词库加载失败</p>' +
                '<p style="font-size:12px;margin-top:8px;opacity:0.8;">请刷新页面重试</p>';
        }
    }

    function getUsers() {
        const data = localStorage.getItem('recite_users');
        return data ? JSON.parse(data) : {};
    }
    
    function saveUsers(users) {
        localStorage.setItem('recite_users', JSON.stringify(users));
    }
    
    function initNewUser(username, password) {
        return {

            score: 0,

            wrongQuestions: {}
        };
    }

        if (!users[currentUser.username]) return;
        users[currentUser.username] = {
            password: users[currentUser.username].password,
            score: currentUser.score,
            studiedUnits: currentUser.studiedUnits,
            wrongQuestions: currentUser.wrongQuestions
        };
        saveUsers(users);
    }
    
    // ==================== 登录/注册 ====================
    function switchLoginTab(tab) {
        document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
        document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
        document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
        document.getElementById('loginError').textContent = '';
        document.getElementById('registerError').textContent = '';
    }
    
    function doLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        const errorEl = document.getElementById('loginError');
        
        if (!username || !password) {
            errorEl.textContent = '请输入用户名和密码';
            return;
        }
        
        const users = getUsers();
        if (!users[username]) {
            errorEl.textContent = '用户不存在，请先注册';
            return;
        }
        
        if (users[username].password !== password) {
            errorEl.textContent = '密码错误';
            return;
        }
        
        const userData = users[username];
        currentUser = {
            username: username,
            score: userData.score || 0,
            studiedUnits: userData.studiedUnits || [],
            wrongQuestions: userData.wrongQuestions || {}
        };
        localStorage.setItem('recite_current', username);
        
        if (wordDataLoaded) {
            showMainPage();
        } else {
            loadWordData();
        }
    }
    
    function doRegister() {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        const password2 = document.getElementById('regPassword2').value;
        const errorEl = document.getElementById('registerError');
        
        if (!username || !password) {
            errorEl.textContent = '请输入用户名和密码';
            return;
        }
        
        if (password.length < 6) {
            errorEl.textContent = '密码至少需要6位';
            return;
        }
        
        if (password !== password2) {
            errorEl.textContent = '两次输入的密码不一样';
            return;
        }
        
        const users = getUsers();
        if (users[username]) {
            errorEl.textContent = '用户名已存在';
            return;
        }
        
        const newUser = initNewUser(username, password);
        users[username] = newUser;
        saveUsers(users);
        
        currentUser = {
            username: username,
            score: 0,
            studiedUnits: [],
            wrongQuestions: {}
        };
        localStorage.setItem('recite_current', username);
        
        if (wordDataLoaded) {
            showMainPage();
        } else {
            loadWordData();
        }
    }
    
    function doLogout() {
        currentUser = null;
        localStorage.removeItem('recite_current');
        showPage('loginPage');
    }

    // ==================== 年级/单元渲染 ====================
    function renderGradeList() {
        const container = document.getElementById('gradeList');
        container.innerHTML = '';
        
        const grades = Object.keys(wordData).sort();
        const icons = { "3A": "📘", "3B": "📗", "4A": "📕", "4B": "📙", "5A": "📔", "5B": "📓" };
        
        grades.forEach(grade => {
            const gradeInfo = gradeNames[grade] || grade;
            const totalUnits = getGradeUnitCount(grade);
            const studiedUnits = getStudiedUnitCount(grade);
            
            const card = document.createElement('div');
            card.className = 'grade-card';
            card.onclick = () => showUnitPage(grade);
            card.innerHTML = `
                <div class="grade-header">
                    <div class="grade-name">${grade} ${gradeInfo}</div>
                    <div class="grade-icon">${icons[grade] || '📚'}</div>
                </div>
                <div class="grade-desc">共${totalUnits} 个Unit</div>
                <div class="grade-progress-bar">
                    <div class="grade-progress-fill" style="width: ${totalUnits > 0 ? (studiedUnits / totalUnits * 100) : 0}%"></div>
                </div>
                <div class="grade-stats">
                    <span>已学${studiedUnits} 个单词</span>
                    <span>${totalUnits > 0 ? Math.round(studiedUnits / totalUnits * 100) : 0}%</span>
                </div>
            `;
            container.appendChild(card);
        });
    }
    
    function getGradeUnitCount(grade) {
        let count = 0;
        const modules = wordData[grade];
        if (!modules) return 0;
        for (const mod in modules) {
            count += Object.keys(modules[mod]).length;
        }
        return count;
    }
    
    function getStudiedUnitCount(grade) {
        if (!currentUser.studiedUnits) return 0;
        return currentUser.studiedUnits.filter(id => id.startsWith(grade + '-')).length;
    }
    
    function showUnitPage(grade) {
        currentGrade = grade;
        document.getElementById('unitGradeTitle').textContent = grade + ' ' + (gradeNames[grade] || '');
        renderUnitList();
        showPage('unitPage');
    }
    
    function goBackToGrade() {
        showMainPage();
    }
    
    function renderUnitList() {
        const container = document.getElementById('unitList');
        container.innerHTML = '';
        
        const modules = wordData[currentGrade];
        if (!modules) return;
        
        const moduleKeys = Object.keys(modules).sort();
        
        moduleKeys.forEach(modKey => {
            const section = document.createElement('div');
            section.className = 'module-section';
            
            const units = modules[modKey];
            const unitKeys = Object.keys(units).sort();
            
            let unitHTML = '';
            unitKeys.forEach(unitKey => {
                const unitId = `${currentGrade}-${modKey}-${unitKey}`;
                const wordCount = units[unitKey].length;
                const isStudied = currentUser.studiedUnits.includes(unitId);
                
                unitHTML += `
                    <div class="unit-card ${isStudied ? 'studied' : ''}" onclick="showSettingsPage('${modKey}', '${unitKey}')">
                        <div class="unit-num">${unitKey.replace('U', 'U')}</div>
                        <div class="unit-word-count">${wordCount}个</div>
                        ${isStudied ? '<div class="unit-status">✓已学</div>' : ''}
                    </div>
                `;
            });
            
            section.innerHTML = `
                <div class="module-title">${moduleNames[modKey] || modKey}</div>
                <div class="unit-grid">${unitHTML}</div>
            `;
            container.appendChild(section);
        });

    // ==================== 背诵逻辑 ====================
    function startRecite() {
        const count = parseInt(document.getElementById('countInput').value);
        const words = wordData[currentGrade][currentModule][currentUnit];
        
        if (!words || words.length === 0) {
            alert('该单元没有单词');
            return;
        }
        
        const wordList = [...words];
        shuffleArray(wordList);
        
        if (count < wordList.length) {
            currentWordList = wordList.slice(0, count);
        } else {
            currentWordList = wordList;
        }
        
        currentIndex = 0;
        wrongWords = [];
        rightCount = 0;
        isReviewMode = false;
        
        renderReciteWord();
        showPage('recitePage');
    }
    
    function renderReciteWord() {
        const word = currentWordList[currentIndex];
        const progress = (currentIndex / currentWordList.length) * 100;
        
        document.getElementById('reciteCurrent').textContent = currentIndex + 1;
        document.getElementById('reciteTotal').textContent = currentWordList.length;
        document.getElementById('reciteProgressFill').style.width = progress + '%';
        
        const wordEl = document.getElementById('reciteWord');
        const answerEl = document.getElementById('reciteAnswer');
        
        answerEl.classList.remove('show');
        answerEl.textContent = '';
        
        if (selectedMode === 'english') {
            wordEl.textContent = word.en;
            answerEl.dataset.pending = word.zh;
        } else {
            wordEl.textContent = word.zh;
            answerEl.dataset.pending = word.en;
        }
        
        updateStarBtn();
        
        fitText(wordEl, 34, 20);
        
        document.getElementById('showAnswerBtn').style.display = 'block';
        document.getElementById('markButtons').style.display = 'none';
    }
    
    function isWordInWrongBook(word) {
        if (!currentGrade || !currentModule || !currentUnit) return false;
        const unitWrong = currentUser.wrongQuestions[currentGrade]?.[currentModule]?.[currentUnit];
        if (!unitWrong) return false;
        return unitWrong.some(w => w.en === word.en && w.zh === word.zh);
    }
    
    function updateStarBtn() {
        const word = currentWordList[currentIndex];
        const starBtn = document.getElementById('starBtn');
        const inWrong = isWordInWrongBook(word);
        starBtn.textContent = inWrong ? '★' : '☆';
        starBtn.classList.toggle('starred', inWrong);
        starBtn.title = inWrong ? '已加入错题集' : '加入错题本';
    }
    
    function toggleStar() {
        const word = currentWordList[currentIndex];
        const inWrong = isWordInWrongBook(word);
        
        if (inWrong) return;
        
        if (!currentUser.wrongQuestions[currentGrade]) {
            currentUser.wrongQuestions[currentGrade] = {};
        }
        if (!currentUser.wrongQuestions[currentGrade][currentModule]) {
            currentUser.wrongQuestions[currentGrade][currentModule] = {};
        }
        if (!currentUser.wrongQuestions[currentGrade][currentModule][currentUnit]) {
            currentUser.wrongQuestions[currentGrade][currentModule][currentUnit] = [];
        }
        
        const unitWrong = currentUser.wrongQuestions[currentGrade][currentModule][currentUnit];
        const exists = unitWrong.some(w => w.en === word.en && w.zh === word.zh);
        if (!exists) {
            unitWrong.push({ en: word.en, zh: word.zh });
        }
        
        saveCurrentUserData();
        updateStarBtn();
        renderWrongBook();
    }
    
    function showAnswer() {
        const answerEl = document.getElementById('reciteAnswer');
        const pending = answerEl.dataset.pending;
        if (pending) {
            answerEl.textContent = pending;
            answerEl.dataset.pending = '';
            fitText(answerEl, 24, 16);
        }
        answerEl.classList.add('show');
        document.getElementById('showAnswerBtn').style.display = 'none';
        document.getElementById('markButtons').style.display = 'flex';
    }
    
    function markRight() {
        rightCount++;
        nextWord();
    }
    
    function markWrong() {
        wrongWords.push(currentWordList[currentIndex]);
        nextWord();
    }
    
    function nextWord() {
        currentIndex++;
        if (currentIndex < currentWordList.length) {
            renderReciteWord();
        } else {
            finishRecite();
        }
    }
    
    function finishRecite() {
        const scoreEarned = rightCount;
        currentUser.score += scoreEarned;
        
        const unitId = `${currentGrade}-${currentModule}-${currentUnit}`;
        if (!currentUser.studiedUnits.includes(unitId)) {
            currentUser.studiedUnits.push(unitId);
        }
        
        saveCurrentUserData();
        updateHeaderScore();
        
        document.getElementById('statRight').textContent = rightCount;
        document.getElementById('statWrong').textContent = wrongWords.length;
        document.getElementById('statScore').textContent = '+' + scoreEarned;
        
        if (wrongWords.length === 0) {
            document.getElementById('resultIcon').textContent = '🎉';
            document.getElementById('resultTitle').textContent = '本轮全对，太棒了！';
            document.getElementById('reviewText').textContent = '继续保持，你做得很好！';
            document.getElementById('reviewWrongBtn').style.display = 'none';
        } else {
            document.getElementById('resultIcon').textContent = '📝';
            document.getElementById('resultTitle').textContent = '本轮背诵完成！';
            document.getElementById('reviewText').textContent = `你有 ${wrongWords.length} 个错题，是否再背一遍？`;
            document.getElementById('reviewWrongBtn').style.display = 'block';
        }
        
        showPage('reviewPage');
    }
    
    function reviewWrong() {
        if (wrongWords.length === 0) {
            goBackToUnit();
            return;
        }
        currentWordList = [...wrongWords];
        shuffleArray(currentWordList);
        currentIndex = 0;
        wrongWords = [];
        rightCount = 0;
        isReviewMode = true;
        renderReciteWord();
        showPage('recitePage');
    }
    
    function quitRecite() {
        if (confirm('确定要退出背诵吗？')) {
            goBackToUnit();
        }
    }
    
    function updateHeaderScore() {
        document.getElementById('headerScore').textContent = '积分' + currentUser.score;
    }
    
    // ==================== 错题本====================
    function renderWrongBook() {
        const container = document.getElementById('wrongbookList');
        const wrong = currentUser.wrongQuestions;
        
        let totalWrong = 0;
        for (const g in wrong) {
            for (const m in wrong[g]) {
                for (const u in wrong[g][m]) {
                    totalWrong += wrong[g][m][u].length;
                }
            }
        }
        
        const reciteAllBtn = document.getElementById('reciteAllWrongBtn');
        if (reciteAllBtn) {
            reciteAllBtn.style.display = totalWrong > 0 ? 'inline-block' : 'none';
        }
        
        if (totalWrong === 0) {
            container.innerHTML = `
                <div class="wrongbook-empty">
                    <div class="wrongbook-icon">🎉</div>
                    <div class="wrongbook-title">太棒了！</div>
                    <div class="wrongbook-desc">你还没有错题，继续保持哦纯</div>
                </div>
            `;
            return;
        }
        
        let html = '';
        const grades = Object.keys(wrong).sort();
        
        grades.forEach(grade => {
            html += `<div class="wrong-grade-section">`;
            html += `<div class="wrong-grade-title">${grade} ${gradeNames[grade] || ''}</div>`;
            
            const modules = wrong[grade];
            const modKeys = Object.keys(modules).sort();
            
            modKeys.forEach(modKey => {
                const units = modules[modKey];
                const unitKeys = Object.keys(units).sort();
                
                let totalModWrong = 0;
                unitKeys.forEach(u => totalModWrong += units[u].length);
                
                html += `<div class="wrong-module">`;
                html += `<div style="font-weight:600;font-size:14px;">${moduleNames[modKey] || modKey} <span style="color:#ef4444;font-weight:400;">(${totalModWrong}题</span></div>`;
                html += `<div class="wrong-unit-list">`;
                
                unitKeys.forEach(unitKey => {
                    const count = units[unitKey].length;
                    html += `
                        <div class="wrong-unit-item" onclick="showWrongDetail('${grade}', '${modKey}', '${unitKey}')">
                            ${unitKey}
                            <div class="wrong-unit-count">${count}个</div>
                        </div>
                    `;
                });
                
                html += `</div></div>`;
            });
            
            html += `</div>`;
        });
        
        container.innerHTML = html;
    }
    
    let wrongDetailGrade = null;
    let wrongDetailModule = null;
    let wrongDetailUnit = null;
    
    function showWrongDetail(grade, modKey, unitKey) {
        wrongDetailGrade = grade;
        wrongDetailModule = modKey;
        wrongDetailUnit = unitKey;
        
        document.getElementById('wrongDetailTitle').textContent = 
            `${grade} ${moduleNames[modKey] || ''} ${unitKey} 错题`;
        
        renderWrongDetailList();
        showPage('wrongDetailPage');
    }
    
    function goBackToWrongBook() {
        renderWrongBook();
        showMainPage();
        switchNav('wrongbook');
    }
    
    function renderWrongDetailList() {
        const container = document.getElementById('wrongDetailList');
        const wrongList = currentUser.wrongQuestions[wrongDetailGrade]?.[wrongDetailModule]?.[wrongDetailUnit];
        
        if (!wrongList || wrongList.length === 0) {
            container.innerHTML = `
                <div class="wrongbook-empty">
                    <div class="wrongbook-icon">📭</div>
                    <div class="wrongbook-title">没有错题</div>
                    <div class="wrongbook-desc">该单元没有错题啦纯</div>
                </div>
            `;
            return;
        }
        
        let html = '';
        wrongList.forEach((word, index) => {
            html += `
                <div class="wrong-word-item">
                    <div class="wrong-word-info">
                        <div class="wrong-word-en">${word.en}</div>
                        <div class="wrong-word-zh">${word.zh}</div>
                    </div>
                    <button class="remove-wrong-btn" onclick="removeFromWrongBook(${index})">移除</button>
                </div>
            `;
        });
        
        html += `
            <button class="btn btn-primary" style="margin-top:20px;" onclick="reciteWrongUnit()">📖 背诵这些错题</button>
        `;
        
        container.innerHTML = html;
    }
    
    function removeFromWrongBook(index) {
        const wrongList = currentUser.wrongQuestions[wrongDetailGrade]?.[wrongDetailModule]?.[wrongDetailUnit];
        if (!wrongList) return;
        
        if (!confirm('确定要将这个单词移出错题集吗？')) return;
        
        wrongList.splice(index, 1);
        
        if (wrongList.length === 0) {
            delete currentUser.wrongQuestions[wrongDetailGrade][wrongDetailModule][wrongDetailUnit];
            if (Object.keys(currentUser.wrongQuestions[wrongDetailGrade][wrongDetailModule]).length === 0) {
                delete currentUser.wrongQuestions[wrongDetailGrade][wrongDetailModule];
                if (Object.keys(currentUser.wrongQuestions[wrongDetailGrade]).length === 0) {
                    delete currentUser.wrongQuestions[wrongDetailGrade];
                }
            }
        }
        
        saveCurrentUserData();
        renderWrongDetailList();
    }
    
    function reciteWrongUnit() {
        const wrongList = currentUser.wrongQuestions[wrongDetailGrade]?.[wrongDetailModule]?.[wrongDetailUnit];
        if (!wrongList || wrongList.length === 0) return;
        
        currentGrade = wrongDetailGrade;
        currentModule = wrongDetailModule;
        currentUnit = wrongDetailUnit;
        currentWordList = [...wrongList];
        shuffleArray(currentWordList);
        currentIndex = 0;
        wrongWords = [];
        rightCount = 0;
        isReviewMode = true;
        
        renderReciteWord();
        showPage('recitePage');
    }
    
    function reciteAllWrong() {
        const allWrong = [];
        const wrong = currentUser.wrongQuestions;
        
        for (const g in wrong) {
            for (const m in wrong[g]) {
                for (const u in wrong[g][m]) {
                    wrong[g][m][u].forEach(word => {
                        allWrong.push({ ...word, grade: g, module: m, unit: u });
                    });
                }
            }
        }
        
        if (allWrong.length === 0) return;
        
        shuffleArray(allWrong);
        currentWordList = allWrong;
        currentIndex = 0;
        wrongWords = [];
        rightCount = 0;
        isReviewMode = true;
        
        if (allWrong.length > 0) {
            currentGrade = allWrong[0].grade;
            currentModule = allWrong[0].module;
            currentUnit = allWrong[0].unit;
        }
        
        renderReciteWord();
        showPage('recitePage');
    }
    
    // ==================== 导入/导出 ====================
    function showIEModal() {
        document.getElementById('ieModal').classList.add('active');
    }
    
    function closeIEModal() {
        document.getElementById('ieModal').classList.remove('active');
    }
    
    function encodeData(data) {
        const str = JSON.stringify(data);
        let encoded = '';
        for (let i = 0; i < str.length; i++) {
            encoded += String.fromCharCode(str.charCodeAt(i) ^ 0x7F);
        }
        return btoa(unescape(encodeURIComponent(encoded)));
    }
    
    function decodeData(str) {
        try {
            const decoded = decodeURIComponent(escape(atob(str)));
            let original = '';
            for (let i = 0; i < decoded.length; i++) {
                original += String.fromCharCode(decoded.charCodeAt(i) ^ 0x7F);
            }
            return JSON.parse(original);
        } catch (e) {
            return null;
        }
    }
    
    function exportData() {
        const data = {
            username: currentUser.username,
            score: currentUser.score,
            studiedUnits: currentUser.studiedUnits,
            wrongQuestions: currentUser.wrongQuestions,
            exportTime: new Date().toISOString()
        };
        
        const encoded = encodeData(data);
        const blob = new Blob([encoded], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${currentUser.username}_学习数据.recite`;
        a.click();
        URL.revokeObjectURL(url);
        closeIEModal();
        alert('导出成功！');
    }
    
    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const content = e.target.result;
                const data = decodeData(content);
                
                if (!data || !data.username) {
                    alert('导入失败：文件格式不正确');
                    return;
                }
                
                if (data.username !== currentUser.username) {
                    if (!confirm(`该数据属于用户"${data.username}"，确定要导入到当前用户"${currentUser.username}" 吗？\n\n积分将合并，错题集将合并。`)) {
                        return;
                    }
                }
                
                // 合并积分
                currentUser.score += data.score || 0;
                
                // 合并已学单元
                if (data.studiedUnits) {
                    data.studiedUnits.forEach(u => {
                        if (!currentUser.studiedUnits.includes(u)) {
                            currentUser.studiedUnits.push(u);
                        }
                    });
                }
                
                // 合并错题本
                if (data.wrongQuestions) {
                    for (const g in data.wrongQuestions) {
                        if (!currentUser.wrongQuestions[g]) {
                            currentUser.wrongQuestions[g] = {};
                        }
                        for (const m in data.wrongQuestions[g]) {
                            if (!currentUser.wrongQuestions[g][m]) {
                                currentUser.wrongQuestions[g][m] = {};
                            }
                            for (const u in data.wrongQuestions[g][m]) {
                                if (!currentUser.wrongQuestions[g][m][u]) {
                                    currentUser.wrongQuestions[g][m][u] = [];
                                }
                                data.wrongQuestions[g][m][u].forEach(w => {
                                    const exists = currentUser.wrongQuestions[g][m][u].some(
                                        q => q.en === w.en && q.zh === w.zh
                                    );
                                    if (!exists) {
                                        currentUser.wrongQuestions[g][m][u].push(w);
                                    }
                                });
                            }
                        }
                    }
                }
                
                saveCurrentUserData();
                updateHeaderScore();
                renderWrongBook();
                closeIEModal();
                alert('导入成功！');
                
            } catch (e) {
                console.error(e);
                alert('导入失败：文件损坏或格式不正确');
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    }
    
    // ==================== 工具函数 ====================
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }
    
    function fitText(element, baseSize, minSize) {
        element.style.fontSize = baseSize + 'px';
        const card = element.closest('.recite-card');
        if (!card) return;
        let attempts = 0;
        const maxAttempts = 10;
        while (attempts < maxAttempts) {
            const overflow = element.scrollHeight > element.clientHeight + 2 ||
                element.scrollWidth > element.clientWidth + 2;
            if (!overflow) break;
            const current = parseFloat(element.style.fontSize);
            const next = current - 2;
            if (next < minSize) break;
            element.style.fontSize = next + 'px';
            attempts++;
        }
    }
    
    // ==================== 初始化====================
    function init() {
        const savedUsername = localStorage.getItem('recite_current');
        if (savedUsername) {
            const users = getUsers();
            if (users[savedUsername]) {
                const userData = users[savedUsername];
                currentUser = {
                    username: savedUsername,
                    score: userData.score || 0,
                    studiedUnits: userData.studiedUnits || [],
                    wrongQuestions: userData.wrongQuestions || {}
                };
                loadWordData();
                return;
            }
        }
        showPage('loginPage');
    }
    
    // 回车登录
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            if (document.getElementById('loginPage').classList.contains('active')) {
                const loginVisible = document.getElementById('loginForm').style.display !== 'none';
                if (loginVisible) {
                    doLogin();
                } else {
                    doRegister();
                }
            }
        }
    });
    
    // 点击模态框外部关闭
    document.getElementById('ieModal').addEventListener('click', function(e) {
        if (e.target === this) {
            closeIEModal();
        }
    });
    
    init();
    </script>
</body>
</html>
